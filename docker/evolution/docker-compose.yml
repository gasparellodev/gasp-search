name: gasp-evolution

# ------------------------------------------------------------------------------
# Evolution API + Postgres + Redis (dev local)
#
# Uso:
#   1. Copie .env.example para .env e preencha AUTHENTICATION_API_KEY +
#      WEBHOOK_GLOBAL_URL (ngrok do gasp-search rodando em http://localhost:3000).
#   2. docker compose up -d
#   3. Evolution responde em http://localhost:8080 (ver README.md).
#
# Em produção: NÃO usar este compose; subir Evolution em VPS dedicada.
# ------------------------------------------------------------------------------

services:
  evolution:
    image: atendai/evolution-api:v2.2.3
    container_name: gasp-evolution
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SERVER_TYPE: http
      SERVER_PORT: 8080
      SERVER_URL: http://localhost:8080

      AUTHENTICATION_API_KEY: ${AUTHENTICATION_API_KEY}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"

      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://evolution:${POSTGRES_PASSWORD}@evolution-postgres:5432/evolution?schema=public
      DATABASE_CONNECTION_CLIENT_NAME: evolution_exchange

      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://evolution-redis:6379
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_REDIS_SAVE_INSTANCES: "true"

      WEBHOOK_GLOBAL_URL: ${WEBHOOK_GLOBAL_URL}
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: "false"

      WEBHOOK_EVENTS_QRCODE_UPDATED: "true"
      WEBHOOK_EVENTS_MESSAGES_UPSERT: "true"
      WEBHOOK_EVENTS_MESSAGES_UPDATE: "true"
      WEBHOOK_EVENTS_CONNECTION_UPDATE: "true"

      DEL_INSTANCE: "false"
      LANGUAGE: pt-BR
      CONFIG_SESSION_PHONE_CLIENT: gasp-search
      CONFIG_SESSION_PHONE_NAME: Chrome
    depends_on:
      evolution-postgres:
        condition: service_healthy
      evolution-redis:
        condition: service_healthy
    volumes:
      - evolution_instances:/evolution/instances

  evolution-postgres:
    image: postgres:16-alpine
    container_name: gasp-evolution-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: evolution
    volumes:
      - evolution_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evolution -d evolution"]
      interval: 5s
      timeout: 5s
      retries: 10

  evolution-redis:
    image: redis:7-alpine
    container_name: gasp-evolution-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--appendonly", "yes"]
    volumes:
      - evolution_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  evolution_instances:
  evolution_postgres_data:
  evolution_redis_data:
