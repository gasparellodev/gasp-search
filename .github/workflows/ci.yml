name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          if [ -f package.json ] && [ -f package-lock.json ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping lint — package.json/lock not present yet"
          fi
      - if: steps.check.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - if: steps.check.outputs.ready == 'true'
        run: npm ci
      - if: steps.check.outputs.ready == 'true'
        run: npm run lint

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          if [ -f package.json ] && [ -f package-lock.json ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping typecheck — package.json/lock not present yet"
          fi
      - if: steps.check.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - if: steps.check.outputs.ready == 'true'
        run: npm ci
      - if: steps.check.outputs.ready == 'true'
        run: npx tsc --noEmit

  unit:
    name: unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          if [ -f package.json ] && [ -f package-lock.json ] && [ -f vitest.config.ts ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping unit — vitest config not present yet"
          fi
      - if: steps.check.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - if: steps.check.outputs.ready == 'true'
        run: npm ci
      - if: steps.check.outputs.ready == 'true'
        run: npm test -- --coverage
      - if: steps.check.outputs.ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.run_id }}
          path: coverage/
          if-no-files-found: ignore

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          if [ -f package.json ] && [ -f package-lock.json ] && [ -f playwright.config.ts ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping e2e — playwright config not present yet"
          fi
      - if: steps.check.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - if: steps.check.outputs.ready == 'true'
        run: npm ci
      - if: steps.check.outputs.ready == 'true'
        run: npx playwright install --with-deps chromium
      - if: steps.check.outputs.ready == 'true'
        run: npm run build
        env:
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'http://localhost' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'placeholder-service-role' }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN || 'placeholder-apify' }}
          APIFY_GOOGLE_MAPS_ACTOR_ID: compass~crawler-google-places
          APIFY_INSTAGRAM_ACTOR_ID: apify~instagram-scraper
          APIFY_WEBSITE_CONTACT_ACTOR_ID: vdrmota~contact-info-scraper
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || 'placeholder-anthropic' }}
          ANTHROPIC_MODEL: claude-sonnet-4-6
      - if: steps.check.outputs.ready == 'true'
        run: npm run test:e2e
        env:
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'http://localhost' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'placeholder-service-role' }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN || 'placeholder-apify' }}
          APIFY_GOOGLE_MAPS_ACTOR_ID: compass~crawler-google-places
          APIFY_INSTAGRAM_ACTOR_ID: apify~instagram-scraper
          APIFY_WEBSITE_CONTACT_ACTOR_ID: vdrmota~contact-info-scraper
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || 'placeholder-anthropic' }}
          ANTHROPIC_MODEL: claude-sonnet-4-6
      - if: steps.check.outputs.ready == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          if-no-files-found: ignore

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          if [ -f package.json ] && [ -f package-lock.json ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping build — package.json/lock not present yet"
          fi
      - if: steps.check.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - if: steps.check.outputs.ready == 'true'
        run: npm ci
      - if: steps.check.outputs.ready == 'true'
        run: npm run build
        env:
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'http://localhost' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'placeholder-service-role' }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN || 'placeholder-apify' }}
          APIFY_GOOGLE_MAPS_ACTOR_ID: compass~crawler-google-places
          APIFY_INSTAGRAM_ACTOR_ID: apify~instagram-scraper
          APIFY_WEBSITE_CONTACT_ACTOR_ID: vdrmota~contact-info-scraper
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || 'placeholder-anthropic' }}
          ANTHROPIC_MODEL: claude-sonnet-4-6
